<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FidgetDesk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </div>

    <div class="nav-right">
      <button id="refreshBtn">Refresh Desk</button>
    </div>
  </nav>

  <!-- MAIN DESK AREA -->
  <main>
    <div id="desk">
      <div id="lamp"></div>
      <div class="ball"></div>
      <div class="note"></div>
    </div>
  </main>

  <!-- SCRIPTS -->
  <script>
    // Refresh button (placeholder)
    document.getElementById("refreshBtn").addEventListener("click", () => {
      alert("Desk refresh coming soon!");
    });

    // Lamp toggle
    const lamp = document.getElementById("lamp");

    lamp.addEventListener("click", () => {
      lamp.classList.toggle("on");
    });
  </script>

</body>
</html>
