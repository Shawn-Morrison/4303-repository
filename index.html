<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FidgetDesk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </div>

    <div class="nav-right">
      <button id="refreshBtn">Refresh Desk</button>
    </div>
  </nav>

  <!-- MAIN DESK AREA -->
  <main>
    <div id="desk">
        <div class="desk-title">FidgetDesk</div>
        
      <div id="lamp"></div>
      <div class="ball"></div>
      <div class="notepad">
  <div class="notepad-header">My Notes</div>
  <div class="page"></div>
  <div class="page"></div>
  <div class="page"></div>
</div>
    </div>
  </main>

  <!-- SCRIPTS -->
 <script>
/* =========================
   GLOBAL ELEMENTS
========================= */
const desk = document.getElementById("desk");

/* =========================
   NAVBAR BUTTON
========================= */
document.getElementById("refreshBtn").addEventListener("click", () => {
  alert("Desk refresh coming soon!");
});

/* =========================
   LAMP LOGIC
========================= */
const lamp = document.getElementById("lamp");

lamp.addEventListener("click", () => {
  lamp.classList.toggle("on");
});

/* =========================
   BALL (DRAG + GRAVITY)
========================= */
const ball = document.querySelector(".ball");

let isDraggingBall = false;
let ballOffsetX = 0;
let ballOffsetY = 0;

let velocityY = 0;
let gravity = 0.5;
let bounce = 0.7;
let isFalling = false;

ball.addEventListener("mousedown", (e) => {
  isDraggingBall = true;

  ballOffsetX = e.clientX - ball.offsetLeft;
  ballOffsetY = e.clientY - ball.offsetTop;

  velocityY = 0;
});

document.addEventListener("mousemove", (e) => {
  if (isDraggingBall) {
    ball.style.left = e.clientX - ballOffsetX + "px";
    ball.style.top = e.clientY - ballOffsetY + "px";
  }
});

document.addEventListener("mouseup", () => {
  if (isDraggingBall) {
    isDraggingBall = false;

    if (!isFalling) {
      isFalling = true;
      applyGravity();
    }
  }
});

function applyGravity() {
  if (isDraggingBall) {
    isFalling = false;
    return;
  }

  let top = ball.offsetTop;
  let floor = desk.clientHeight - ball.offsetHeight;

  velocityY += gravity;
  top += velocityY;

  if (top >= floor) {
    top = floor;
    velocityY *= -bounce;

    // stop tiny bounce
    if (Math.abs(velocityY) < 1) {
      isFalling = false;
      return;
    }
  }

  ball.style.top = top + "px";

  requestAnimationFrame(applyGravity);
}

/* =========================
   NOTEPAD (TEAR + DRAG)
========================= */
const notepad = document.querySelector(".notepad");

let activePage = null;
let pageOffsetX = 0;
let pageOffsetY = 0;

notepad.addEventListener("mousedown", (e) => {
  const topPage = notepad.querySelector(".page:last-child");
  if (!topPage) return;

  // clone page
  activePage = topPage.cloneNode(true);

  activePage.style.position = "absolute";
  activePage.style.left = notepad.offsetLeft + "px";
  activePage.style.top = notepad.offsetTop + "px";
  activePage.style.width = notepad.offsetWidth + "px";
  activePage.style.height = notepad.offsetHeight + "px";
  activePage.style.zIndex = 1000;
  activePage.style.transform = "rotate(-5deg)";

  desk.appendChild(activePage);

  pageOffsetX = e.clientX - activePage.offsetLeft;
  pageOffsetY = e.clientY - activePage.offsetTop;
});

document.addEventListener("mousemove", (e) => {
  if (activePage) {
    activePage.style.left = e.clientX - pageOffsetX + "px";
    activePage.style.top = e.clientY - pageOffsetY + "px";
  }
});

document.addEventListener("mouseup", () => {
  // remove dragged page
  if (activePage) {
    activePage.remove();
    activePage = null;

    // remove top page from stack
    const pages = notepad.querySelectorAll(".page");
    if (pages.length > 0) {
      pages[pages.length - 1].remove();
    }
  }
});
</script>


</body>
</html>
