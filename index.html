<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FidgetDesk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </div>

    <div class="nav-right">
      <button id="refreshBtn" type="button">Refresh Desk</button>
    </div>
  </nav>

  <!-- MAIN DESK AREA -->
<main>
  <section class="desk-wrapper">
    <div class="desk-label">FidgetDesk</div>

    <div id="desk">
      <div id="lamp" aria-label="Toggle lamp" role="button" tabindex="0"></div>

<div class="ball" aria-label="Ball"></div>

<div class="notepad" aria-label="Notepad">
  <div class="notepad-header">My Notes</div>
  <div class="page"></div>
  <div class="page"></div>
  <div class="page"></div>
</div>

<div class="mug" aria-label="Coffee mug">
  <div class="mug-water"></div>
  <div class="mug-label">World's Best Boss</div>
</div>

<div class="splash" id="splash" aria-hidden="true">
  <span class="droplet droplet-1"></span>
  <span class="droplet droplet-2"></span>
  <span class="droplet droplet-3"></span>
  <span class="droplet droplet-4"></span>
  <span class="droplet droplet-5"></span>
  <span class="droplet droplet-6"></span>
</div>

<div class="racer" id="racer" aria-label="Pull back racer">
  <div class="racer-body"></div>
  <div class="racer-window"></div>
  <div class="racer-wheel racer-wheel-front"></div>
  <div class="racer-wheel racer-wheel-back"></div>
</div>


    </div>
  </section>
</main>


  <script>
    const desk = document.getElementById("desk");
    const refreshBtn = document.getElementById("refreshBtn");
    const lamp = document.getElementById("lamp");
    const ball = document.querySelector(".ball");
    const notepad = document.querySelector(".notepad");
    const mug = document.querySelector(".mug");
    const splash = document.getElementById("splash");
    const racer = document.getElementById("racer");


    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function getDeskRect() {
      return desk.getBoundingClientRect();
    }

    function resetDeskItems() {
  ball.style.left = "20%";
  ball.style.top = "18%";

  notepad.style.left = "55%";
  notepad.style.top = "14%";

  racer.style.left = "140px";
  racer.style.top = "78%";
  racer.classList.remove("racing");


  lamp.classList.remove("on");
mug.classList.remove("spilled");
splash.classList.remove("active");
ball.classList.remove("in-mug");

velocityY = 0;
isFalling = false;
splashTriggered = false;
isRolling = false;
isDraggingRacer = false;
isRacerMoving = false;
pullDistance = 0;


  const missingPages = 3 - notepad.querySelectorAll(".page").length;
  for (let i = 0; i < missingPages; i++) {
    const page = document.createElement("div");
    page.className = "page";
    notepad.appendChild(page);
  }
}

    refreshBtn.addEventListener("click", resetDeskItems);

    lamp.addEventListener("click", () => {
      lamp.classList.toggle("on");
    });

    lamp.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        lamp.classList.toggle("on");
      }
    });

    /* =========================
       BALL (DRAG + GRAVITY)
    ========================= */
    let isDraggingBall = false;
    let ballPointerId = null;
    let ballOffsetX = 0;
    let ballOffsetY = 0;

    let velocityY = 0;
    const gravity = 0.45;
    const bounce = 0.68;
    let isFalling = false;
    let splashTriggered = false;
    let isRolling = false;



    ball.addEventListener("pointerdown", (e) => {
      e.preventDefault();

      const deskRect = getDeskRect();
      const ballRect = ball.getBoundingClientRect();

      isDraggingBall = true;
      ballPointerId = e.pointerId;
      ball.setPointerCapture(e.pointerId);

      ballOffsetX = e.clientX - ballRect.left;
      ballOffsetY = e.clientY - ballRect.top;

      velocityY = 0;
isFalling = false;
isRolling = false;
ball.classList.remove("in-mug");


      const left = ballRect.left - deskRect.left;
      const top = ballRect.top - deskRect.top;

      ball.style.left = left + "px";
      ball.style.top = top + "px";
    });

    ball.addEventListener("pointermove", (e) => {
      if (!isDraggingBall || e.pointerId !== ballPointerId) return;

      e.preventDefault();

      const deskRect = getDeskRect();

      const newLeft = clamp(
        e.clientX - deskRect.left - ballOffsetX,
        0,
        desk.clientWidth - ball.offsetWidth
      );

      const newTop = clamp(
        e.clientY - deskRect.top - ballOffsetY,
        0,
        desk.clientHeight - ball.offsetHeight
      );

      ball.style.left = newLeft + "px";
      ball.style.top = newTop + "px";
    });

    function releaseBall(e) {
      if (!isDraggingBall || e.pointerId !== ballPointerId) return;

      isDraggingBall = false;
      ballPointerId = null;

      if (!isFalling) {
        isFalling = true;
        requestAnimationFrame(applyGravity);
      }
    }

    ball.addEventListener("pointerup", releaseBall);
    ball.addEventListener("pointercancel", releaseBall);

function applyGravity() {
  if (isDraggingBall) {
    isFalling = false;
    return;
  }

  let top = ball.offsetTop;
  let left = ball.offsetLeft;

  const deskFloor = desk.clientHeight - ball.offsetHeight;

  const mugLeft = mug.offsetLeft;
  const mugRight = mug.offsetLeft + mug.offsetWidth;
  const mugInnerLeft = mugLeft + mug.offsetWidth * 0.2;
  const mugInnerRight = mugRight - mug.offsetWidth * 0.2;
  const mugCatchTop = mug.offsetTop + mug.offsetHeight * 0.18;

  const ballCenterX = left + ball.offsetWidth / 2;
  const overMugOpening = ballCenterX > mugInnerLeft && ballCenterX < mugInnerRight;

  let floor = deskFloor;
  let landedInMug = false;

  if (overMugOpening) {
    floor = mugCatchTop - ball.offsetHeight * 0.35;
    landedInMug = true;
  }

  velocityY += gravity;
  top += velocityY;

  if (top >= floor) {
  top = floor;

  if (landedInMug) {
  velocityY = 0;
  isFalling = false;
  isRolling = false;

  const mugCenterLeft = mug.offsetLeft + mug.offsetWidth / 2 - ball.offsetWidth / 2;
  const settledTop = mug.offsetTop + mug.offsetHeight * 0.12;

  checkCupSplash();

  ball.style.left = clamp(
    mugCenterLeft,
    0,
    desk.clientWidth - ball.offsetWidth
  ) + "px";

  ball.style.top = settledTop + "px";

  setTimeout(() => {
    ball.classList.add("in-mug");
  }, 140);

  return;
}



    velocityY *= -bounce;

if (Math.abs(velocityY) < 1) {
  velocityY = 0;
  isFalling = false;
  ball.style.top = floor + "px";
  ball.classList.remove("in-mug");
  checkCupSplash();
  startDeskRoll();
  return;
}

  }

  ball.style.top = top + "px";
  checkCupSplash();
  requestAnimationFrame(applyGravity);
}


function checkCupSplash() {
  if (splashTriggered) return;

  const ballRect = ball.getBoundingClientRect();
  const mugRect = mug.getBoundingClientRect();

  const ballCenterX = ballRect.left + ballRect.width / 2;
  const ballBottomY = ballRect.bottom;

  const insideCupX =
    ballCenterX > mugRect.left + mugRect.width * 0.18 &&
    ballCenterX < mugRect.right - mugRect.width * 0.18;

  const insideCupY =
    ballBottomY > mugRect.top + mugRect.height * 0.18 &&
    ballBottomY < mugRect.bottom - mugRect.height * 0.12;

  if (insideCupX && insideCupY) {
    triggerSplash();
  }
}

function triggerSplash() {
  splashTriggered = true;
  mug.classList.add("spilled");
  splash.classList.remove("active");
  void splash.offsetWidth;
  splash.classList.add("active");

  setTimeout(() => {
    splash.classList.remove("active");
  }, 900);

  function startDeskRoll() {
  if (isRolling) return;

  isRolling = true;

  const direction = Math.random() < 0.5 ? -1 : 1;
  let speed = Math.random() * 1.8 + 1.2;
  const friction = 0.94;
  const floor = desk.clientHeight - ball.offsetHeight;

  function rollStep() {
    if (isDraggingBall || isFalling) {
      isRolling = false;
      return;
    }

    if (Math.abs(speed) < 0.15) {
      isRolling = false;
      return;
    }

    let left = ball.offsetLeft + direction * speed;
    left = clamp(left, 0, desk.clientWidth - ball.offsetWidth);

    if (left === 0 || left === desk.clientWidth - ball.offsetWidth) {
      isRolling = false;
      return;
    }

    ball.style.left = left + "px";
    ball.style.top = floor + "px";

    speed *= friction;
    requestAnimationFrame(rollStep);
  }

  requestAnimationFrame(rollStep);
}

}

/* =========================
   PULL BACK RACER
========================= */
let isDraggingRacer = false;
let isRacerMoving = false;
let racerPointerId = null;
let racerStartLeft = 140;
let racerStartTop = 0;
let racerDragStartX = 0;
let racerCurrentLeft = 140;
let pullDistance = 0;

function updateRacerStartTop() {
  racerStartTop = desk.clientHeight * 0.78;
  racer.style.top = racerStartTop + "px";
}

function resetRacerPosition() {
  racerCurrentLeft = racerStartLeft;
  racer.style.left = racerStartLeft + "px";
  racer.style.top = racerStartTop + "px";
  racer.classList.remove("racing");
  isRacerMoving = false;
  pullDistance = 0;
}

racer.addEventListener("pointerdown", (e) => {
  if (isRacerMoving) return;

  e.preventDefault();

  isDraggingRacer = true;
  racerPointerId = e.pointerId;
  racer.setPointerCapture(e.pointerId);
  racer.classList.remove("racing");

  racerDragStartX = e.clientX;
  racerCurrentLeft = racer.offsetLeft;
});

racer.addEventListener("pointermove", (e) => {
  if (!isDraggingRacer || e.pointerId !== racerPointerId) return;

  e.preventDefault();

  const deltaX = e.clientX - racerDragStartX;

  const minLeft = 40;
  const maxLeft = racerStartLeft;

  let newLeft = racerCurrentLeft + deltaX;
  newLeft = clamp(newLeft, minLeft, maxLeft);

  pullDistance = racerStartLeft - newLeft;

  racer.style.left = newLeft + "px";
  racer.style.top = racerStartTop + "px";

  const tilt = Math.min(pullDistance / 12, 8);
  racer.style.transform = `rotate(${-tilt}deg)`;
});

function releaseRacer(e) {
  if (!isDraggingRacer || e.pointerId !== racerPointerId) return;

  isDraggingRacer = false;
  racerPointerId = null;
  racer.style.transform = "";

  if (pullDistance < 15) {
    racer.style.left = racerStartLeft + "px";
    pullDistance = 0;
    return;
  }

  launchRacer();
}

racer.addEventListener("pointerup", releaseRacer);
racer.addEventListener("pointercancel", releaseRacer);

function launchRacer() {
  if (isRacerMoving) return;

  isRacerMoving = true;
  racer.classList.add("racing");

  let speed = Math.max(8, pullDistance * 0.18 + 6);
  let left = racer.offsetLeft;
  const finish = desk.clientWidth + 120;

  function raceStep() {
    if (isDraggingRacer) {
      isRacerMoving = false;
      racer.classList.remove("racing");
      return;
    }

    left += speed;
    speed *= 0.992;

    racer.style.left = left + "px";
    racer.style.top = racerStartTop + "px";

    if (left < finish) {
      requestAnimationFrame(raceStep);
      return;
    }

    setTimeout(() => {
      resetRacerPosition();
    }, 350);
  }

  requestAnimationFrame(raceStep);
}

window.addEventListener("resize", () => {
  updateRacerStartTop();

  if (!isDraggingRacer && !isRacerMoving) {
    racer.style.top = racerStartTop + "px";
  }
});




    /* =========================
       NOTEPAD (TEAR + DRAG)
    ========================= */
    let activePage = null;
    let activePagePointerId = null;
    let pageOffsetX = 0;
    let pageOffsetY = 0;

    notepad.addEventListener("pointerdown", (e) => {
      const topPage = notepad.querySelector(".page:last-child");
      if (!topPage) return;

      e.preventDefault();

      const deskRect = getDeskRect();
      const pageRect = topPage.getBoundingClientRect();

      activePage = topPage.cloneNode(true);
      activePagePointerId = e.pointerId;

      activePage.classList.add("dragged-page");
      activePage.style.left = pageRect.left - deskRect.left + "px";
      activePage.style.top = pageRect.top - deskRect.top + "px";
      activePage.style.width = pageRect.width + "px";
      activePage.style.height = pageRect.height + "px";

      desk.appendChild(activePage);

      pageOffsetX = e.clientX - pageRect.left;
      pageOffsetY = e.clientY - pageRect.top;

      notepad.setPointerCapture(e.pointerId);
    });

    notepad.addEventListener("pointermove", (e) => {
      if (!activePage || e.pointerId !== activePagePointerId) return;

      e.preventDefault();

      const newLeft = clamp(
        e.clientX - getDeskRect().left - pageOffsetX,
        0,
        desk.clientWidth - activePage.offsetWidth
      );

      const newTop = clamp(
        e.clientY - getDeskRect().top - pageOffsetY,
        0,
        desk.clientHeight - activePage.offsetHeight
      );

      activePage.style.left = newLeft + "px";
      activePage.style.top = newTop + "px";
    });

    function releasePage(e) {
      if (!activePage || e.pointerId !== activePagePointerId) return;

      activePage.remove();
      activePage = null;
      activePagePointerId = null;

      const pages = notepad.querySelectorAll(".page");
      if (pages.length > 0) {
        pages[pages.length - 1].remove();
      }
    }

    notepad.addEventListener("pointerup", releasePage);
    notepad.addEventListener("pointercancel", releasePage);

    window.addEventListener("load", () => {
  updateRacerStartTop();
  resetDeskItems();
});


  </script>
</body>
</html>
