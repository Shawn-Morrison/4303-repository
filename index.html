<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FidgetDesk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </div>

    <div class="nav-right">
      <button id="refreshBtn">Refresh Desk</button>
    </div>
  </nav>

  <!-- MAIN DESK AREA -->
  <main>
    <div id="desk">
        <div class="desk-title">FidgetDesk</div>
        
      <div id="lamp"></div>
      <div class="ball"></div>
      <div class="notepad">
  <div class="notepad-header">My Notes</div>
  <div class="page"></div>
  <div class="page"></div>
  <div class="page"></div>
</div>
    </div>
  </main>

  <!-- SCRIPTS -->
  <script>
    // Refresh button (placeholder)
    document.getElementById("refreshBtn").addEventListener("click", () => {
      alert("Desk refresh coming soon!");
    });

    // Lamp toggle
    const lamp = document.getElementById("lamp");

    lamp.addEventListener("click", () => {
      lamp.classList.toggle("on");
    });
  // DRAG BALL
 const ball = document.querySelector(".ball");

  let isDragging = false;
  let offsetX, offsetY;

  ball.addEventListener("mousedown", (e) => {
    isDragging = true;

    // calculate offset so it doesn't jump
    offsetX = e.clientX - ball.offsetLeft;
    offsetY = e.clientY - ball.offsetTop;
  });

  document.addEventListener("mousemove", (e) => {
    if (isDragging) {
      ball.style.left = e.clientX - offsetX + "px";
      ball.style.top = e.clientY - offsetY + "px";
    }
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
  });
  </script>

</body>
</html>
