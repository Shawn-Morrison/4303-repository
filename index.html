<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FidgetDesk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </div>

    <div class="nav-right">
      <button id="refreshBtn">Refresh Desk</button>
    </div>
  </nav>

  <!-- MAIN DESK AREA -->
  <main>
    <div id="desk">
        <div class="desk-title">FidgetDesk</div>
        
      <div id="lamp"></div>
      <div class="ball"></div>
      <div class="notepad">
  <div class="notepad-header">My Notes</div>
  <div class="page"></div>
  <div class="page"></div>
  <div class="page"></div>
</div>
    </div>
  </main>

  <!-- SCRIPTS -->
  <script>
    // Refresh button (placeholder)
    document.getElementById("refreshBtn").addEventListener("click", () => {
      alert("Desk refresh coming soon!");
    });

    // Lamp toggle
    const lamp = document.getElementById("lamp");

    lamp.addEventListener("click", () => {
      lamp.classList.toggle("on");
    });
  // DRAG BALL
 const ball = document.querySelector(".ball");

let isDragging = false;
let offsetX, offsetY;

let velocityY = 0;
let gravity = 0.5;
let bounce = 0.7;

ball.addEventListener("mousedown", (e) => {
  isDragging = true;

  offsetX = e.clientX - ball.offsetLeft;
  offsetY = e.clientY - ball.offsetTop;

  velocityY = 0; // reset velocity while dragging
});

document.addEventListener("mousemove", (e) => {
  if (isDragging) {
    ball.style.left = e.clientX - offsetX + "px";
    ball.style.top = e.clientY - offsetY + "px";
  }
});

document.addEventListener("mouseup", () => {
  isDragging = false;
  applyGravity();
});

function applyGravity() {
  if (isDragging) return;

  let top = ball.offsetTop;
  let desk = document.getElementById("desk");
  let floor = desk.clientHeight - ball.offsetHeight;

  velocityY += gravity;
  top += velocityY;

  if (top >= floor) {
    top = floor;
    velocityY *= -bounce;
  }

  ball.style.top = top + "px";

  requestAnimationFrame(applyGravity);
}
  // NOTEPAD TEAR FEATURE
const notepad = document.querySelector(".notepad");

notepad.addEventListener("mousedown", (e) => {
  const topPage = notepad.querySelector(".page:last-child");

  if (!topPage) return;

  topPage.style.transform = "translateY(-20px) rotate(-5deg)";
  topPage.style.transition = "0.2s";
});

document.addEventListener("mouseup", () => {
  const pages = document.querySelectorAll(".notepad .page");

  if (pages.length > 0) {
    pages[pages.length - 1].remove(); // remove top page
  }
});
  </script>

</body>
</html>
